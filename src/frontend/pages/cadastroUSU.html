<!DOCTYPE html>
<html lang="Pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/variables.css">
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="../styles/components.css">
    <link rel="stylesheet" href="../styles/cadastroEMP.css">
    <title>Integra+ | Cadastro de Usuário</title>
</head>

<body class="auth">
    <main id="swup" class="transition-fade">
        <section class="container">
            <a href="../index.html" class="btn-voltar" id="txt-cadastrousu-013">
                <span id="txt-cadastrousu-001">&larr;Voltar</span>
            </a>

            <section class="container-login">
                <h1 id="txt-cadastrousu-002">Integra +</h1>
                <h2 id="txt-cadastrousu-003">Criar conta como Usuário</h2>

                <form>
                    <div class="input-group">
                        <h5 class="txt" id="txt-cadastrousu-004">Nome Completo</h5>
                        <input type="text" id="nome" class="input-field" placeholder="Seu nome completo" required>
                    </div>

                    <div class="input-group">
                        <h5 class="txt" id="txt-cadastrousu-005">Email</h5>
                        <input type="email" id="email" class="input-field" placeholder="Seu @email.com" required>
                        <p id="error-message"></p>
                    </div>

                    <div class="input-group">
                        <h5 class="txt" id="txt-cadastrousu-006">Data de Nascimento</h5>
                        <input type="date" id="dataNascimento" class="input-field" placeholder="dd/mm/aaaa" required>
                    </div>

                    <div class="input-group">
                        <h5 class="txt" id="txt-cadastrousu-007">Senha</h5>
                        <input type="password" id="senha" class="input-field" placeholder=".........." required>
                    </div>

                    <div class="input-group">
                        <h5 class="txt" id="txt-cadastrousu-008">Confirmar Senha</h5>
                        <input type="password"  class="input-field" id="confirmarSenha" placeholder=".........." required>
                        <p id="error-message2"></p>
                    </div>
 
                    <button type="submit" class="button-entrar" id="txt-cadastrousu-009">Cadastrar</button>
                </form>

                <hr class="linha">
                
                <h2 id="txt-cadastrousu-010">Já tem uma conta?</h2>
                <a class="button-rec-senha" href="login.html" id="txt-cadastrousu-011">Fazer Login</a>
            </section>

            <button class="trocar-idioma" id="txt-cadastrousu-012">
                Trocar idioma
                <img class="bandeira-idioma" src="../assets/img/bandeira.png" alt="Bandeira">
            </button>
        </section>
    </main>



    <script src="/scripts/cadastroUSU.js"></script>
</body>
</html>
