<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles/variables.css">
    <link rel="stylesheet" href="/styles/main.css">
    <link rel="stylesheet" href="/styles/components.css">
    <link rel="stylesheet" href="/styles/cadastrar_vagas.css">
    <link rel="stylesheet" href="/styles/gerenciar_vagas.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
</head>

<body>
    <header class="header">
        <a class="title" href="menu_empresa.html">Integra+</a>

        <a class="perfil" href="perfil_empresa.html">
            <img class="bandeira-idioma" src="/assets/img/user.png" alt="">
            <span id="nome"></span>
        </a>

        <a class="sair" href="login.html">
            <span class="material-symbols-outlined">logout</span>
            <span>Sair</span>
        </a>
    </header>
    <main>
        <div class="voltar-idioma">
            <a href="gerenciar_vagas.html" class="btn-voltar">
                <span class="material-symbols-outlined">arrow_back</span>
                <span>Voltar</span>
            </a>
        </div>

        <h1 class="titulo-secao">
            Painel da Empresa
        </h1>
        <p class="subtitulo">Gerencie suas vagas de emprego</p>

        <form class="form-vaga">
            <input id="titulo" type="text" placeholder="Título" required>
            <input id="cidade" type="text" placeholder="Cidade" required >
            <input id="carga" type="text" placeholder="Carga Horária" required>
            <input id="modelo" type="text" placeholder="Modelo" required>
            <input id="requisitos" type="text" placeholder="Requisitos" required>
            <input id="salario" type="text" placeholder="Salário" required>
            <textarea id="descricao" placeholder="Descrição"></textarea required>

            <button id="publicar" type="button" class="btn-publicar">Publicar</button>
        </form>

        <section class="vagas">
            <h2>📋 Vagas Cadastradas</h2>

            <div id="lista-vagas"></div>
        </section>
        </section>
    </main>
    <script src="/scripts/animations.js"></script>
    <script src="/scripts/cadastrar_vagas.js"></script>
    <script src="/scripts/token.js"></script>
</body>

</html>
