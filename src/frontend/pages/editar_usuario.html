<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles/variables.css">
    <link rel="stylesheet" href="/styles/main.css">
    <link rel="stylesheet" href="/styles/components.css">
    <link rel="stylesheet" href="/styles/editar_usuario.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
</head>

<body>
    <header class="header">
            <a class="title" href="" id="txt-editar-usuario-001">Integra+</a>

            <a class="perfil" href="">
                <img class="bandeira-idioma" src="/assets/img/bandeira.png" alt="">
                <span id="nome"></span>
            </a>

            <a class="sair" href="login.html" id="txt-editar-usuario-014">
                <span class="material-symbols-outlined">logout</span>
                <span id="txt-editar-usuario-002">Sair</span>
            </a>
    </header>
    <main>
        <div class="voltar-idioma">
                <a href="" class="btn-voltar" id="txt-editar-usuario-015">
                    <span class="material-symbols-outlined">arrow_back</span>
                    <span id="txt-editar-usuario-003">Voltar</span>
                </a>
                <button class="trocar-idioma" id="txt-editar-usuario-013">
                    Trocar idioma
                <img class="bandeira-idioma" src="/assets/img/bandeira.png" alt="">
                </button>
        </div>
        <div class="perfil-card">
            <div class="perfil-topo"></div>
            <div class="perfil-info">
            <button class="avatar">
                +
            </button>

            <div class="nome-editar">
                <h2 id="txt-editar-usuario-004">Nome</h2>
                <button class="btn-editar">
                    <span class="material-symbols-outlined">edit</span>
                </button>
            </div>

            <div class="info-linha">
                <div class="info-item">
                    <span class="material-symbols-outlined">mail</span>
                    <span id="txt-editar-usuario-005">aaa@gmail.com</span>
                    <button class="btn-editar">
                        <span class="material-symbols-outlined">edit</span>
                    </button>
                </div>

            <div class="info-item">
                <span class="material-symbols-outlined">phone</span>
                <span>(19)99999-9999</span>
                <button class="btn-editar">
                    <span class="material-symbols-outlined">edit</span>
                </button>
            </div>

            <div class="info-item">
                <span class="material-symbols-outlined">cake</span>
                <span id="txt-editar-usuario-006">35 anos</span>
                <button class="btn-editar">
                    <span class="material-symbols-outlined">edit</span>
                </button>
            </div>

        </div>

    <form class="form-perfil">

        <label id="txt-editar-usuario-007">Nacionalidade:</label>
        <input type="text">

        <label id="txt-editar-usuario-008">Escolaridade:</label>
        <input type="text">

        <label id="txt-editar-usuario-009">Formação:</label>
        <input type="text">

        <label id="txt-editar-usuario-010">Idiomas:</label>
        <input type="text">

        <label id="txt-editar-usuario-011">Sobre você:</label>
        <textarea rows="4"></textarea>
        <button class="btn-concluir" id="txt-editar-usuario-012">Concluir</button>
    </form>
</div>

</main>
    <script src="/scripts/animations.js"></script>
</body>
</html>
