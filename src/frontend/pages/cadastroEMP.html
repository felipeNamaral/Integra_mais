<!DOCTYPE html>
<html lang="Pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/variables.css">
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="../styles/components.css">
    <link rel="stylesheet" href="../styles/cadastroEMP.css">
    <title id="txt-cadastroemp-015">Integra+ | Cadastro Empresa</title>
</head>

<body class="auth">
    <main id="swup" class="transition-fade">
        <section class="container">
            <a href="../index.html" class="btn-voltar" id="txt-cadastroemp-014">
                <span id="txt-cadastroemp-001">&larr;Voltar</span>
            </a>

            <section class="container-login">
                <h1 id="txt-cadastroemp-002">Integra +</h1>
                <h2 id="txt-cadastroemp-003">Criar conta como Empresa</h2>

                <form>
                    <div class="input-group">
                        <h5 class="txt" id="txt-cadastroemp-004">Nome da empresa</h5>
                        <input type="text" id="nomeEmpresa" class="input-field" placeholder="Nome da empresa" required>
                    </div>

                    <div class="input-group">
                        <h5 class="txt" id="txt-cadastroemp-005">CNPJ</h5>
                        <input type="txt" id="cnpj" class="input-field" placeholder="00000000000000"
                            maxlength="14" pattern="\d{14}" inputmode="numeric" required>
                    </div>

                    <div class="input-group">
                        <h5 class="txt" id="txt-cadastroemp-006">Email corporativo</h5>
                        <input type="email" id="emailCorporativo" class="input-field" placeholder="contato@empresa.com"
                            required>
                        <p id="error-message"></p>
                    </div>

                    <div class="input-group">
                        <h5 class="txt" id="txt-cadastroemp-007">Endereço</h5>
                        <input type="text" id="endereco" class="input-field" placeholder="Rua, Cidade, Estado" required>
                    </div>

                    <div class="input-group">
                        <h5 class="txt" id="txt-cadastroemp-008">Senha</h5>
                        <input type="password" id="senha" class="input-field" placeholder=".........." required>
                    </div>

                    <div class="input-group">
                        <h5 class="txt" id="txt-cadastroemp-009">Confirmar Senha</h5>
                        <input type="password" id="confirmarSenha" class="input-field" placeholder=".........."
                            required>
                        <p id="error-message2"></p>
                    </div>

                    <button type="submit" class="button-entrar" id="txt-cadastroemp-010">Entrar</button>
                </form>

                <hr class="linha">

                <h2 id="txt-cadastroemp-011">Já tem uma conta?</h2>
                <a class="button-rec-senha" href="login.html" id="txt-cadastroemp-012">Fazer Login</a>
            </section>

            <button class="trocar-idioma" id="txt-cadastroemp-013">
                Trocar idioma
                <img class="bandeira-idioma" src="../assets/img/bandeira.png" alt="Bandeira">
            </button>
        </section>
    </main>

    <script src="/scripts/cadastroEMP.js"></script>
    <script src="../scripts/trocar_idioma.js"></script>
</body>



</html>
