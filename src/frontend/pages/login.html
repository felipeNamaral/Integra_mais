<!DOCTYPE html>
<html lang="Pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles/variables.css">
    <link rel="stylesheet" href="/styles/main.css">
    <link rel="stylesheet" href="/styles/components.css">
    <link rel="stylesheet" href="/styles/login.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=arrow_back" />
    <title>Integra+</title>
</head>

<body class="auth">
    <main id="swup" class="transition-fade">
        <section class="container">
            <a href="../index.html" class="btn-voltar">
                <span class="material-symbols-outlined">arrow_back</span>
                <span>Voltar</span>
            </a>
            <section class="container-login">
                <h1>Integra +</h1>
                <h2>Entre na sua conta</h2>

                <form id="loginForm">
                    <h5 class="txt">Email</h5>
                    <input id="email" type="email" class="input-field" placeholder="Seu@email.com" required>

                    <h5 class="txt">Senha</h5>
                    <input id="password" type="password" class="input-field" placeholder="Digite sua senha" required>
                    <p id="error-message"></p>
                    <button type="submit" class="button-entrar">Entrar</button>
                </form>

                <hr class="linha">
                <a class="button-rec-senha" href="">Esqueceu sua senha?</a>

                <h2>Ainda não tem uma conta?</h2>

                <button class="button-cadastro-ususario">Criar conta como Usuário</button>
                <button class="button-cadastro-empresa">Criar conta como empresa</button>
            </section>
            <button class="trocar-idioma">
                Trocar idioma
                <img class="bandeira-idioma" src="../assets/img/bandeira.png" alt="">
            </button>
        </section>
    </main>


    <script src="https://unpkg.com/swup@4"></script>
    <script src="https://unpkg.com/@swup/head-plugin@2"></script>
    <script type="module" src="../scripts/animations.js"></script>
    <script src="../scripts/login.js"></script>
</body>

</html>
