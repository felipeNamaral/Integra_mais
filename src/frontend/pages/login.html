<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/variables.css">
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="../styles/components.css">
    <link rel="stylesheet" href="../styles/login.css">
    <title>Integra+ | Login</title>
</head>
<body class="auth">
    <main id="swup" class="transition-fade">
        <section class="container">
            <a href="../index.html" class="btn-voltar-login">
                <span>&larr; Voltar</span>
            </a>

            <section class="card-login">
                <h1 class="logo-text">Integra +</h1>
                <p class="subtitle">Entrar na sua conta</p>

                <form id="loginForm">
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" class="input-field" placeholder="Seu@email.com" required>
                    </div>

                    <div class="input-group">
                        <label>Senha</label>
                        <input type="password" class="input-field" placeholder=".........." required>
                    </div>

                    <button type="submit" class="button-entrar">Entrar</button>
                    
                    <a href="#" class="link-esqueceu">Esqueceu sua senha?</a>
                </form>

                <div class="divisor-login">
                    <p>Ainda não tem uma conta?</p>
                </div>

                <div class="login-actions">
                    <a href="cadastroUSU.html" class="button-outline">Criar conta como Usuário</a>
                    <a href="cadastroEMP.html" class="button-outline">Criar conta como empresa</a>
                </div>
            </section>

            <button class="trocar-idioma-float">
                Trocar idioma <img src="../assets/img/bandeira.png" class="bandeira-icon">
            </button>
        </section>
    </main>

    <script src="https://unpkg.com/swup@4"></script>
    <script type="module" src="../scripts/animations.js"></script>
    <script src="../scripts/login.js"></script>
</body>
</html>
