<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet">
    <link rel="stylesheet" href="/styles/variables.css">
    <link rel="stylesheet" href="/styles/main.css">
    <link rel="stylesheet" href="/styles/components.css">
    <link rel="stylesheet" href="../styles/detalhes_vaga.css">
    <title>Integra+ | Detalhes da Vaga</title>
</head>

<body>

    <header class="header">
        <a class="title" href="menu_empresa.html">Integra+</a>

        <a class="perfil" href="perfil_empresa.html">
            <img class="bandeira-idioma" src="/assets/img/user.png" alt="">
            <span id="nome"></span>
        </a>

        <a class="sair" href="login.html">
            <span class="material-symbols-outlined">logout</span>
            <span>Sair</span>
        </a>
    </header>


    <main class="container">
        <a href="vagas_empresa.html" class="btn-voltar">
            <span class="material-symbols-outlined">arrow_back</span>
            Voltar para vagas
        </a>

        <div class="card-vaga">

            <div class="header-vaga">
                <h1 id="titulo-vaga"></h1>

                <div class="info-linha">

                    <div class="info-item">
                        <span class="material-symbols-outlined">apartment</span>
                        <span id="empresa-vaga"></span>
                    </div>

                    <div class="info-item">
                        <span class="material-symbols-outlined">location_on</span>
                        <span id="cidade-vaga"></span>
                    </div>

                </div>
            </div>

            <div class="conteudo-vaga">

                <section class="secao">
                    <h3>Descrição da Vaga</h3>
                    <p id="descricao-vaga"></p>
                </section>

                <section class="secao">
                    <h3>Requisitos</h3>
                    <ul class="lista-requisitos" id="requisitos-vaga">

                    </ul>
                </section>
                <div class="info-item">
                    <span class="material-symbols-outlined">payments</span>
                    <span id="salario-vaga"></span>
                </div>

                <div class="info-item">
                    <span class="material-symbols-outlined">schedule</span>
                    <span id="carga-horaria-vaga"></span>
                </div>

                <div class="info-item">
                    <span class="material-symbols-outlined">work</span>
                    <span id="tipo-vaga"></span>
                </div>

                <div class="info-item">
                    <span class="material-symbols-outlined">event</span>
                    <span id="data-publicacao-vaga"></span>
                </div>

            </div>
        </div>
    </main>

    
    <div id="toast" class="toast"></div>
    <script src="../scripts/detalhe_vaga_empresa.js"></script>
</body>

</html>
