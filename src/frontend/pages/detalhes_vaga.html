<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet">
    <link rel="stylesheet" href="/styles/variables.css">
    <link rel="stylesheet" href="/styles/main.css">
    <link rel="stylesheet" href="/styles/components.css">
    <link rel="stylesheet" href="../styles/detalhes_vaga.css">
    <title id="txt-detalhes-vaga-001">Integra+ | Detalhes da Vaga</title>
</head>

<body>

    <header class="header">
        <a class="title" href="menu_usuario.html" id="txt-detalhes-vaga-002">Integra+</a>

        <a class="perfil" href="perfil_usuario.html">
            <img class="bandeira-idioma" src="/assets/img/user.png" alt="">
            <span id="nome"></span>
        </a>

        <a class="sair" href="login.html" id="txt-detalhes-vaga-003">
            <span class="material-symbols-outlined">logout</span>
            <span id="txt-detalhes-vaga-010">Sair</span>
        </a>
    </header>
        <div class="voltar-idioma">
            <a href="vagas_usuario.html" class="btn-voltar" id="txt-health-106">
                <span class="material-symbols-outlined">arrow_back</span>
                <span id="txt-health-003">Voltar</span>
            </a>
            <button class="trocar-idioma" id="txt-health-102">
                Trocar idioma
                <img class="bandeira-idioma" src="/assets/img/bandeira.png" alt="">
            </button>
        </div>

    <main class="container">


        <div class="card-vaga">

            <div class="header-vaga">
                <h1 id="titulo-vaga"></h1>

                <div class="info-linha">

                    <div class="info-item">
                        <span class="material-symbols-outlined">apartment</span>
                        <span id="empresa-vaga"></span>
                    </div>

                    <div class="info-item">
                        <span class="material-symbols-outlined">location_on</span>
                        <span id="cidade-vaga"></span>
                    </div>

                </div>
            </div>

            <div class="conteudo-vaga">

                <section class="secao">
                    <h3 id="txt-detalhes-vaga-004">Descrição da Vaga</h3>
                    <p id="descricao-vaga"></p>

                </section>
                <section class="secao">
                    <h3 id="txt-detalhes-vaga-005">Mande seu currículo para:</h3>
                    <p id="email-empresa-vaga"></p>
                </section>

                <section class="secao">
                    <h3 id="txt-detalhes-vaga-006">Requisitos</h3>
                    <ul class="lista-requisitos" id="requisitos-vaga">

                    </ul>
                </section>
                <div class="info-item">
                    <span class="material-symbols-outlined">payments</span>
                    <span id="salario-vaga"></span>
                </div>

                <div class="info-item">
                    <span class="material-symbols-outlined">schedule</span>
                    <span id="carga-horaria-vaga"></span>
                </div>

                <div class="info-item">
                    <span class="material-symbols-outlined">work</span>
                    <span id="tipo-vaga"></span>
                </div>

                <div class="info-item">
                    <span class="material-symbols-outlined">event</span>
                    <span id="data-publicacao-vaga"></span>
                </div>



                <section class="acoes">
                    <h3 id="txt-detalhes-vaga-007">Ações</h3>

                    <div class="botoes-grupo">
                        <button class="btn-favoritar" id="btn-favoritar">
                            <span class="material-symbols-outlined">star</span>
                            <span id="txt-detalhes-vaga-008">Favoritar vaga</span>
                        </button>

                        <button class="btn-enviar" id="btn-enviar">
                            <span class="material-symbols-outlined">send</span>
                            <span id="txt-detalhes-vaga-009">Marcar como enviado</span>
                        </button>
                    </div>
                </section>

            </div>
        </div>
    </main>


    <div id="toast" class="toast"></div>
    <script src="../scripts/detalhes_vaga.js"></script>
    <script src="../scripts/trocar_idioma.js"></script>
</body>

</html>
