<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles/variables.css">
    <link rel="stylesheet" href="/styles/main.css">
    <link rel="stylesheet" href="/styles/components.css">
    <link rel="stylesheet" href="/styles/vagas_usuario.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

<body>
    <header class="header">
            <a class="title" href="/pages/menu_usuario.html" id="txt-vagas-usuario-001">Integra+</a>

            <a class="perfil" href="perfil_usuario.html">
                <img class="bandeira-idioma" src="/assets/img/user.png" alt="">
                <span id="nome"></span>
            </a>


            <a class="sair" href="login.html" id="txt-vagas-usuario-007">
                <span class="material-symbols-outlined">logout</span>
                <span id="txt-vagas-usuario-002">Sair</span>
            </a>

    <main>
        <div class="voltar-idioma">

        <div class="info-vagas">
            <span class="material-symbols-outlined">search</span>
            <span id="contador">0 vagas encontradas</span>
        </div>
    </div>

<div id="lista-vagas" class="lista-vagas"></div>

</main>

<script src="/scripts/vagas_usuario.js"></script>
