<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles/variables.css">
    <link rel="stylesheet" href="/styles/main.css">
    <link rel="stylesheet" href="/styles/components.css">
    <link rel="stylesheet" href="/styles/teste.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <title>Perfil do Usuário</title>
</head>

<body>
    <header class="header">
            <a class="title" href="">Integra+</a>

            <a class="perfil" href="">
                <img class="bandeira-idioma" src="/assets/img/user.png" alt="">
                <span id="nome"></span>
            </a>

            <a class="sair" href="login.html">
                <span class="material-symbols-outlined">logout</span>
                <span>Sair</span>
            </a>
    </header>
    <main>
        <div class="voltar-idioma">
                <a href="" class="btn-voltar">
                    <span class="material-symbols-outlined">arrow_back</span>
                    <span>Voltar</span>
                </a>
                <button class="trocar-idioma">
                    Trocar idioma
                    <img class="bandeira-idioma" src="/assets/img/bandeira.png" alt="">
                </button>
        </div>
        <div class="perfil-container">
            <div class="perfil-header">
                <div class="perfil-avatar" id="avatar">
                    <img class="bandeira-idioma" src="/assets/img/user.png" alt="">
                </div>
            </div>

            <div class="perfil-conteudo">
                <div class="perfil-topo">
                    <div>
                        <div class="perfil-nome" id="nomeUsuario">
                            Nome do usuário
                        </div>
                        <div class="perfil-info">
                            <span id="emailUsuario">
                                email
                            </span>
                            <span id="telefoneUsuario">
                                telefone
                            </span>
                            <span id="idadeUsuario">
                                idade
                            </span>
                        </div>
                    </div>
                    <button class="perfil-editar">
                        Editar perfil
                    </button>
                </div>

                <div style="margin-top: 10px;" id="descricaoUsuario">

                </div>

                <div class="perfil-stats">
                    <div class="perfil-stat">
                        <div class="perfil-stat-numero" id="statsFavoritadas">
                            0
                        </div>
                        <div class="perfil-stat-label">
                            Vagas Favoritas
                        </div>
                    </div>

                    <div class="perfil-stat">
                        <div class="perfil-stat-numero" id="statsEnviadas">
                            0
                        </div>
                        <div class="perfil-stat-label">
                            Currículos Enviados
                        </div>
                    </div>
                </div>

                <div class="perfil-section">
                    <div class="perfil-section-titulo">
                        ⭐ Vagas Favoritas
                    </div>
                    <div class="perfil-section-texto" id="vagasFavoritadas">
                        Você ainda não favoritou nenhuma vaga.
                    </div>
                </div>

                <div class="perfil-section">
                    <div class="perfil-section-titulo">
                        📘 Vagas com Currículo Enviado
                    </div>
                    <div class="perfil-section-texto" id="vagasEnviadas">
                        Você ainda não enviou currículo para nenhuma vaga.
                    </div>
                </div>
            </div>
        </div>
    </main>
    
  
    <script src="/scripts/perfilUsuario.js"></script>
    
</body>
</html>
