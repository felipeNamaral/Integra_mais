<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles/variables.css">
    <link rel="stylesheet" href="/styles/main.css">
    <link rel="stylesheet" href="/styles/components.css">
    <link rel="stylesheet" href="/styles/vagas_empresa.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
</head>

<body>
    <header class="header">
            <a class="title" href="">Integra+</a>

            <a class="perfil" href="">
                <img class="bandeira-idioma" src="/assets/img/bandeira.png" alt="">
                <span id="nome"></span>
            </a>

            <a class="sair" href="login.html">
                <span class="material-symbols-outlined">logout</span>
                <span>Sair</span>
            </a>
    </header>
    <main>
        <div class="voltar-idioma">
                <a href="" class="btn-voltar">
                    <span class="material-symbols-outlined">arrow_back</span>
                    <span>Voltar</span>
                </a>
                <button class="trocar-idioma">
                    Trocar idioma
                    <img class="bandeira-idioma" src="/assets/img/bandeira.png" alt="">
                </button>
        </div>
        
    <h1 class="titulo">Vagas Ativas</h1>

    <div class="filtro-vagas">
        <input type="text" placeholder="Todas as localizações">
        <div class="info-vagas">
            <span class="material-symbols-outlined">search</span>
            <span id="contador">0 vagas encontradas</span>
        </div>
    </div>

<div id="lista-vagas" class="lista-vagas"></div>

</main>
<script src="/scripts/animations.js"></script>
<script src="/scripts/vagas_empresas.js"></script>
<script src="/scripts/token.js"></script>
</body>
</html>
