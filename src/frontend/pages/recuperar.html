<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/variables.css">
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="../styles/components.css">
    <link rel="stylesheet" href="../styles/recuperar.css">
    <title id="txt-recuperar-008">Integra+ | Recuperar Senha</title>
</head>
<body class="auth">
    <main id="swup" class="transition-fade">
        <section class="container-central">
            <a href="login.html" class="btn-voltar" id="txt-recuperar-007">
                <span id="txt-recuperar-001">&larr; Voltar</span>
            </a>

            <div class="card-branco">
                <h1 class="logo-azul" id="txt-recuperar-002">Integra +</h1>
                <p class="status-tela" id="txt-recuperar-003">Recuperar senha</p>

                <form id="formRecuperar">
                    <div class="field-group">
                        <label id="txt-recuperar-004">Email</label>
                        <input type="email" class="input-gray" placeholder="Seu@email.com" required>
                    </div>

                    <button type="submit" class="button-principal" id="txt-recuperar-005">Recuperar</button>
                </form>
            </div>

            <button class="idioma-fixo" id="txt-recuperar-006">
                Trocar idioma
                <img src="../assets/img/bandeira.png" class="bandeira-pequena">
            </button>
        </section>
    </main>
    <script src="../scripts/recuperar.js"></script>
    <script src="../scripts/trocar_idioma.js"></script>
</body>
</html>
